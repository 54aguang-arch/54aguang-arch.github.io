<script>
    (function(){
        'use strict';

// ===== STATE =====

        let editorOutput = null;
        let editorFull   = null;
        let _lastParsedObj   = null;  // raw parsed object(s)
        let _lastFormattedJSON = '';
        let _originalJSON = '';  // 未经过滤的原始 JSON
        let _deepParseEnabled = true;
        let _wrapEnabled = false;
        let _isDark = true;
        let _acTimer = null;
        let _allFields = [];          // [{path, type}]
        let _selectedFields = new Set(); // paths to INCLUDE (null = all)
        let _filterActive = false;
        const AC_DELAY = 600;
        const HISTORY_KEY = 'mongo_converter_history';
        const MAX_HISTORY = 20;

// ===== MONACO INIT =====
// ===== TEXTAREA INPUT INIT =====
        const _inputEl = document.getElementById('monacoInput');
        const _inputGutter = document.getElementById('inputGutter');

        // 生成行号并与 textarea 滚动同步
        function syncInputGutterScroll() {
            _inputGutter.style.transform = 'translateY(' + (-_inputEl.scrollTop) + 'px)';
        }
        function updateInputGutter() {
            const lines = _inputEl.value.split('\n').length || 1;
            let nums = '';
            for (let i = 1; i <= lines; i++) nums += i + '\n';
            _inputGutter.textContent = nums;
            syncInputGutterScroll();
        }
        _inputEl.addEventListener('input', () => { autoConvert(); updateInputGutter(); });
        _inputEl.addEventListener('scroll', syncInputGutterScroll);
        _inputEl.addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') convertNow(); });
        updateInputGutter();

        require.config({ paths: { vs: 'https://registry.npmmirror.com/monaco-editor/0.55.1/files/min/vs' } });
        require(['vs/editor/editor.main'], function() {

            // Output editor
            editorOutput = monaco.editor.create(document.getElementById('monacoOutput'), {
                value: '// 转换后的 JSON 将在这里显示...',
                language: 'json',
                theme: 'vs-dark',
                readOnly: _outputReadOnly,
                automaticLayout: true,
                minimap: { enabled: true },
                scrollBeyondLastLine: false,
                fontSize: _outputFontSize,
                lineNumbers: 'on',
                folding: true,
                foldingStrategy: 'indentation',
                wordWrap: 'off',
                renderLineHighlight: 'all',
                scrollbar: { verticalScrollbarSize: 6, horizontalScrollbarSize: 6 },
            });

            // Right-click actions
            [editorOutput].forEach(ed => registerContextActions(ed));
        });

        function registerContextActions(ed) {
            ed.addAction({
                id: 'ts-to-datetime',
                label: '⏱ 时间戳转时间',
                contextMenuGroupId: 'navigation',
                contextMenuOrder: 1,
                run(e) {
                    const raw = e.getModel().getValueInRange(e.getSelection()).trim().replace(/[",]/g,'');
                    let num = Number(raw);
                    if (isNaN(num) || raw === '') { showStatus('⚠️ 请选中有效数字','warning'); return; }
                    if (String(Math.abs(Math.floor(num))).length <= 10) num *= 1000;
                    const d = new Date(num);
                    if (isNaN(d.getTime())) { showStatus('⚠️ 无法解析为有效时间','warning'); return; }
                    const pad = n => String(n).padStart(2,'0');
                    const result = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
                    document.getElementById('tsTimestamp').value = Math.floor(num);
                    document.getElementById('tsDatetime').value = result;
                    toggleTsBar(true);
                    showStatus('✅ ' + raw + '  →  ' + result, 'success');
                }
            });
            ed.addAction({
                id: 'copy-raw-value',
                label: '📋 复制原始值（去引号）',
                contextMenuGroupId: 'navigation',
                contextMenuOrder: 2,
                run(e) {
                    const text = e.getModel().getValueInRange(e.getSelection()).trim().replace(/^"|"$/g,'');
                    navigator.clipboard.writeText(text)
                        .then(() => showStatus('✅ 已复制：' + text.slice(0,40), 'success'))
                        .catch(() => showStatus('❌ 复制失败','error'));
                }
            });
        }

// ===== MONGODB TYPE CONVERSION =====
        function mongoToJSON(input) {
            let out = input
                // NumberLong / NumberInt / NumberDecimal — extract numeric value (支持单/双引号或无引号)
                .replace(/NumberLong\(\s*['"]?(-?\d+)['"]?\s*\)/g, '$1')
                .replace(/NumberInt\(\s*['"]?(-?\d+)['"]?\s*\)/g, '$1')
                .replace(/NumberDecimal\(\s*['"]([^'"]+)['"]\s*\)/g, '"$1"')
                // Long('...') / Long("...") / Long(123) — BSON Long，提取数值
                .replace(/\bLong\(\s*['"]?(-?\d+)['"]?\s*\)/g, '$1')
                // ISODate → string (支持单/双引号)
                .replace(/ISODate\(\s*(['"])(.*?)\1\s*\)/g, '"$2"')
                .replace(/new\s+Date\(\s*(['"])(.*?)\1\s*\)/g, '"$2"')
                .replace(/new\s+Date\((\d+)\)/g, '"$1"')
                // ObjectId → string (支持单/双引号)
                .replace(/ObjectId\(\s*(['"])(.*?)\1\s*\)/g, '"$2"')
                // UUID → string (支持单/双引号)
                .replace(/UUID\(\s*(['"])(.*?)\1\s*\)/g, '"$2"')
                // BinData → placeholder string (支持单/双引号)
                .replace(/BinData\(\s*\d+\s*,\s*(['"])([^'"]*)\1\s*\)/g, '"[BinData:$2]"')
                // DBRef (支持单/双引号)
                .replace(/DBRef\(\s*(['"])([^'"]+)\1\s*,\s*ObjectId\(\s*(['"])([^'"]+)\3\s*\)\s*\)/g, '{"$ref":"$2","$id":"$4"}')
                .replace(/DBRef\(\s*(['"])([^'"]+)\1\s*,\s*(['"])([^'"]+)\3\s*\)/g, '{"$ref":"$2","$id":"$4"}')
                // Timestamp(t, i) → t (seconds)
                .replace(/Timestamp\(\s*(\d+)\s*,\s*\d+\s*\)/g, '$1')
                // MinKey / MaxKey
                .replace(/MinKey/g, '"MinKey"')
                .replace(/MaxKey/g, '"MaxKey"')
                // undefined
                .replace(/\bundefined\b/g, 'null')
                // Single-quoted string values → double-quoted (mongo shell 风格单引号字符串转 JSON 双引号)
                .replace(/'((?:\\.|[^'\\])*)'/g, function (m, g1) {
                    var s = g1
                        .replace(/\\'/g, "'")   // \' → '
                        .replace(/"/g, '\\"');  // " → \"
                    return '"' + s + '"';
                })
                // Unquoted keys: {key: ...} → {"key": ...}
                .replace(/([{,]\s*)([a-zA-Z_$][a-zA-Z0-9_$.]*)\s*:/g, '$1"$2":');

            return out;
        }

// Detect and split multiple root-level documents
        function splitDocuments(input) {
            const trimmed = input.trim();

            // Could be already a JSON array
            if (trimmed.startsWith('[')) {
                return [trimmed];
            }

            // Try to find multiple { } blocks at root level
            const docs = [];
            let depth = 0, start = -1, inStr = false, escape = false;
            for (let i = 0; i < trimmed.length; i++) {
                const ch = trimmed[i];
                if (escape) { escape = false; continue; }
                if (ch === '\\' && inStr) { escape = true; continue; }
                if (ch === '"') { inStr = !inStr; continue; }
                if (inStr) continue;
                if (ch === '{') {
                    if (depth === 0) start = i;
                    depth++;
                } else if (ch === '}') {
                    depth--;
                    if (depth === 0 && start !== -1) {
                        docs.push(trimmed.slice(start, i + 1));
                        start = -1;
                    }
                }
            }
            return docs.length > 0 ? docs : [trimmed];
        }

        function parseMongoInput(raw) {
            const docs = splitDocuments(raw);
            const results = [];
            const errors = [];

            docs.forEach((doc, idx) => {
                try {
                    const converted = mongoToJSON(doc);
                    const parsed = JSON.parse(converted);
                    results.push(parsed);
                } catch(e) {
                    errors.push({ index: idx + 1, msg: e.message });
                }
            });

            return { results, errors, total: docs.length };
        }

// ===== DEEP PARSE =====
        function deepParseStrings(val) {
            if (typeof val === 'string') {
                const t = val.trim();
                if ((t.startsWith('{') && t.endsWith('}')) || (t.startsWith('[') && t.endsWith(']'))) {
                    try { return deepParseStrings(JSON.parse(t)); } catch(e) {}
                }
                return val;
            }
            if (Array.isArray(val)) return val.map(deepParseStrings);
            if (val !== null && typeof val === 'object') {
                const r = {};
                for (const k of Object.keys(val)) r[k] = deepParseStrings(val[k]);
                return r;
            }
            return val;
        }

// ===== STATS =====
        function countFields(obj, depth = 0, maxDepth = 0) {
            if (typeof obj !== 'object' || obj === null) return { fields: 0, depth: maxDepth };
            let fields = 0;
            for (const k of Object.keys(obj)) {
                fields++;
                if (typeof obj[k] === 'object' && obj[k] !== null) {
                    const sub = countFields(obj[k], depth + 1, Math.max(maxDepth, depth + 1));
                    fields += sub.fields;
                    maxDepth = Math.max(maxDepth, sub.depth);
                }
            }
            return { fields, depth: maxDepth };
        }

        function updateOutputStats(obj, jsonStr) {
            const statsEl = document.getElementById('outputStats');
            if (!obj) { statsEl.innerHTML = ''; return; }
            const target = Array.isArray(obj) ? obj : [obj];
            const { fields, depth } = countFields(Array.isArray(obj) ? { _: obj } : obj);
            const bytes = new Blob([jsonStr]).size;
            const bytesStr = bytes < 1024 ? bytes + ' B' : bytes < 1048576 ? (bytes/1024).toFixed(1) + ' KB' : (bytes/1048576).toFixed(2) + ' MB';
            statsEl.innerHTML = `
        <span class="stat-item"><span class="stat-dot blue"></span>${target.length} 文档</span>
        <span class="stat-item"><span class="stat-dot green"></span>${fields} 字段</span>
        <span class="stat-item"><span class="stat-dot orange"></span>${depth} 层</span>
        <span class="stat-item">${bytesStr}</span>`;
        }

// ===== CONVERT =====
        function autoConvert() {
            if (_acTimer) clearTimeout(_acTimer);
            const title = document.getElementById('inputTitle');
            title.classList.add('converting');
            _acTimer = setTimeout(() => { convertNow(); title.classList.remove('converting'); }, AC_DELAY);
        }

        function convertNow() {
            const raw = document.getElementById('monacoInput').value.trim();
            if (!raw) { showStatus('⚠️ 请先粘贴 MongoDB 数据','warning'); return; }

            const { results, errors, total } = parseMongoInput(raw);

            if (results.length === 0) {
                const err = errors[0];
                showStatus(`❌ 转换失败（第${err.index}个文档）：${err.msg}`, 'error');
                return;
            }

            // Apply deep parse
            let processed = results.map(r => _deepParseEnabled ? deepParseStrings(r) : r);

            // Output as array if multiple docs, single object if one
            _lastParsedObj = processed.length === 1 ? processed[0] : processed;
            _lastFormattedJSON = JSON.stringify(_lastParsedObj, null, 2);
            _originalJSON = _lastFormattedJSON;

            setOutputJSON(_lastFormattedJSON);
            updateOutputStats(_lastParsedObj, _lastFormattedJSON);

            // Update doc count badge
            const badge = document.getElementById('docCountBadge');
            if (total > 1) {
                badge.textContent = total + ' 文档';
                badge.style.display = '';
            } else {
                badge.style.display = 'none';
            }

            // Extract fields for filter panel
            extractAllFields(_lastParsedObj);

            // Build status
            if (errors.length > 0) {
                showStatus(`⚠️ ${results.length}/${total} 文档转换成功，${errors.length} 个失败`, 'warning');
            } else if (total > 1) {
                showStatus(`✅ ${total} 个文档全部转换成功！`, 'success');
            } else {
                showStatus('✅ 转换成功！', 'success');
            }

            // Save to history
            saveHistory(raw, _lastFormattedJSON, total, results.length);
        }

        function setOutputJSON(json) {
            if (editorOutput) {
                editorOutput.setValue(json);
                monaco.editor.setModelLanguage(editorOutput.getModel(), 'json');
            }
        }

// ===== FIELD EXTRACTION =====
        function extractAllFields(obj, prefix = '', result = []) {
            if (typeof obj !== 'object' || obj === null) return result;
            const target = Array.isArray(obj) ? (obj[0] || {}) : obj;
            for (const k of Object.keys(target)) {
                const path = prefix ? prefix + '.' + k : k;
                const val = target[k];
                const type = val === null ? 'null' : Array.isArray(val) ? 'array' : typeof val;
                result.push({ path, type });
                if (type === 'object') extractAllFields(val, path, result);
            }
            _allFields = result;
            return result;
        }

// ===== QUICK PASTE =====
        async function quickPaste() {
            try {
                const text = await navigator.clipboard.readText();
                if (!text.trim()) { showStatus('⚠️ 剪贴板为空','warning'); return; }
                document.getElementById('monacoInput').value = text;
                updateInputGutter();
                autoConvert();
                showStatus('✅ 已粘贴，自动转换中...','success');
            } catch(err) {
                if (err.name === 'NotAllowedError') showStatus('❌ 无权限访问剪贴板，请手动粘贴','error');
                else showStatus('❌ 粘贴失败：' + err.message,'error');
            }
        }

// ===== COPY / DOWNLOAD =====
        function copyOutput() {
            if (!_lastFormattedJSON) { showStatus('⚠️ 没有内容可复制','warning'); return; }
            navigator.clipboard.writeText(_lastFormattedJSON)
                .then(() => showStatus('✅ 已复制到剪贴板！','success'))
                .catch(e => showStatus('❌ 复制失败：' + e.message,'error'));
        }

        function downloadJSON() {
            if (!_lastFormattedJSON) { showStatus('⚠️ 没有内容可下载','warning'); return; }
            const blob = new Blob([_lastFormattedJSON], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'mongo_export_' + Date.now() + '.json';
            a.click();
            URL.revokeObjectURL(url);
            showStatus('✅ 下载成功！','success');
        }

// ===== CLEAR =====
        function clearAll() {
            document.getElementById('monacoInput').value = '';
            updateInputGutter();
            if (editorOutput) editorOutput.setValue('');
            _lastParsedObj = null;
            _lastFormattedJSON = '';
            _originalJSON = '';
            _allFields = [];
            document.getElementById('outputStats').innerHTML = '';
            document.getElementById('docCountBadge').style.display = 'none';
            document.getElementById('statusMessage').className = '';
            document.getElementById('inputTitle').classList.remove('converting');
            if (_acTimer) clearTimeout(_acTimer);
        }

// ===== STATUS =====
        let _sTimer = null;
        function showStatus(msg, type) {
            const el = document.getElementById('statusMessage');
            if (_sTimer) clearTimeout(_sTimer);
            el.className = ''; el.style.display = 'none'; void el.offsetWidth;
            el.textContent = msg; el.style.display = 'block'; el.className = type;
            requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('visible')));
            _sTimer = setTimeout(() => {
                el.classList.remove('visible');
                setTimeout(() => { el.className = ''; el.style.display = 'none'; }, 280);
            }, type === 'error' ? 4500 : 2500);
        }

// ===== HISTORY =====
        function loadHistory() {
            try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch(e) { return []; }
        }
        function saveHistory(input, output, total, success) {
            const history = loadHistory();
            const entry = {
                id: Date.now(),
                time: new Date().toLocaleString('zh-CN', { hour12: false }),
                preview: input.slice(0, 120).replace(/\n/g,' '),
                input,
                output,
                total,
                success
            };
            history.unshift(entry);
            if (history.length > MAX_HISTORY) history.splice(MAX_HISTORY);
            try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); } catch(e) {}
        }
        function openHistory() {
            renderHistoryList();
            document.getElementById('historyPanel').classList.add('open');
            document.getElementById('historyOverlay').classList.add('open');
        }
        function closeHistory() {
            document.getElementById('historyPanel').classList.remove('open');
            document.getElementById('historyOverlay').classList.remove('open');
        }
        function renderHistoryList() {
            const history = loadHistory();
            const list = document.getElementById('historyList');
            if (history.length === 0) {
                list.innerHTML = '<div class="history-empty">暂无历史记录</div>';
                return;
            }
            list.innerHTML = history.map(entry => `
        <div class="history-item" onclick="restoreHistory(${entry.id})">
            <div class="history-item-time">${entry.time}</div>
            <div class="history-item-preview">${escapeHtml(entry.preview)}</div>
            <div class="history-item-meta">📄 ${entry.total} 文档 · ✅ ${entry.success} 成功</div>
            <button class="history-del" onclick="deleteHistory(event, ${entry.id})" title="删除">×</button>
        </div>
    `).join('');
        }
        function restoreHistory(id) {
            const history = loadHistory();
            const entry = history.find(h => h.id === id);
            if (!entry) return;
            if (entry.input) {
                document.getElementById('monacoInput').value = entry.input;
                updateInputGutter();
            }
            _lastFormattedJSON = entry.output;
            _originalJSON = entry.output;
            setOutputJSON(entry.output);
            try {
                _lastParsedObj = JSON.parse(entry.output);
                updateOutputStats(_lastParsedObj, entry.output);
                extractAllFields(_lastParsedObj);
            } catch(e) {}
            closeHistory();
            showStatus('✅ 已还原历史记录','success');
        }
        function deleteHistory(e, id) {
            e.stopPropagation();
            let history = loadHistory();
            history = history.filter(h => h.id !== id);
            try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); } catch(e) {}
            renderHistoryList();
        }
        function clearHistory() {
            if (!confirm('确认清空全部历史记录？')) return;
            try { localStorage.removeItem(HISTORY_KEY); } catch(e) {}
            renderHistoryList();
            showStatus('✅ 历史记录已清空','success');
        }

// ===== FIELD FILTER =====
        function openFilterPanel() {
            if (_allFields.length === 0) {
                showStatus('⚠️ 请先转换数据后再过滤', 'warning');
                return;
            }
            if (_selectedFields.size === 0) {
                // Default: all selected
                _allFields.forEach(f => _selectedFields.add(f.path));
            }
            renderFilterList();
            document.getElementById('filterPanel').classList.add('open');
            document.getElementById('filterOverlay').classList.add('open');
        }
        function closeFilterPanel() {
            document.getElementById('filterPanel').classList.remove('open');
            document.getElementById('filterOverlay').classList.remove('open');
        }
        function renderFilterList(query = '') {
            const list = document.getElementById('filterList');
            const fields = query
                ? _allFields.filter(f => f.path.toLowerCase().includes(query.toLowerCase()))
                : _allFields;
            if (fields.length === 0) {
                list.innerHTML = '<div class="filter-empty">没有匹配的字段</div>';
                return;
            }
            // Only show top-level fields (no dots) for simplicity, plus first level nested
            const topLevel = fields.filter(f => f.path.split('.').length <= 2);
            list.innerHTML = topLevel.map(f => {
                const sel = _selectedFields.has(f.path);
                const indent = f.path.includes('.') ? 'style="padding-left:28px"' : '';
                return `
        <div class="filter-item ${sel ? 'selected' : ''}" ${indent} onclick="toggleField('${escapeHtml(f.path)}')">
            <div class="filter-checkbox"><span class="filter-check-icon">✓</span></div>
            <span class="filter-key">${escapeHtml(f.path)}</span>
            <span class="filter-type">${f.type}</span>
        </div>`;
            }).join('');
        }
        function filterSearchFields() {
            renderFilterList(document.getElementById('filterSearch').value);
        }
        function toggleField(path) {
            if (_selectedFields.has(path)) _selectedFields.delete(path);
            else _selectedFields.add(path);
            renderFilterList(document.getElementById('filterSearch').value);
        }
        function selectAllFields()   { _allFields.forEach(f => _selectedFields.add(f.path)); renderFilterList(); }
        function deselectAllFields() { _selectedFields.clear(); renderFilterList(); }
        function invertSelection()   {
            _allFields.forEach(f => {
                if (_selectedFields.has(f.path)) _selectedFields.delete(f.path);
                else _selectedFields.add(f.path);
            });
            renderFilterList();
        }
        function applyFieldFilter() {
            if (!_lastParsedObj) { showStatus('⚠️ 没有数据可过滤','warning'); return; }
            const selected = [..._selectedFields];
            const topLevelSelected = selected.filter(p => !p.includes('.'));

            function filterObj(obj) {
                if (typeof obj !== 'object' || obj === null) return obj;
                if (Array.isArray(obj)) return obj.map(filterObj);
                const result = {};
                for (const k of Object.keys(obj)) {
                    if (topLevelSelected.includes(k)) {
                        result[k] = obj[k];
                    }
                }
                return result;
            }

            const filtered = Array.isArray(_lastParsedObj)
                ? _lastParsedObj.map(filterObj)
                : filterObj(_lastParsedObj);

            const json = JSON.stringify(filtered, null, 2);
            setOutputJSON(json);
            _lastFormattedJSON = json;
            _filterActive = true;
            showStatus(`✅ 已过滤（保留 ${topLevelSelected.length} 个字段），可继续复制或下载`, 'success');
            closeFilterPanel();
        }
        function resetFilter() {
            _selectedFields.clear();
            _allFields.forEach(f => _selectedFields.add(f.path));
            if (_originalJSON) { setOutputJSON(_originalJSON); _lastFormattedJSON = _originalJSON; }
            _filterActive = false;
            renderFilterList();
            showStatus('✅ 已重置，输出已还原', 'success');
        }
// ===== FULLSCREEN =====
        function openFullscreen() {
            document.getElementById('fullscreenOverlay').classList.add('active');
            if (!editorFull) {
                editorFull = monaco.editor.create(document.getElementById('monacoFullscreen'), {
                    model: editorOutput ? editorOutput.getModel() : monaco.editor.createModel(_lastFormattedJSON || '', 'json'),
                    language: 'json',
                    theme: _isDark ? 'vs-dark' : 'vs',
                    readOnly: true,
                    automaticLayout: true,
                    minimap: { enabled: true },
                    scrollBeyondLastLine: false,
                    fontSize: _outputFontSize,
                    lineNumbers: 'on',
                    folding: true,
                    foldingStrategy: 'indentation',
                    wordWrap: 'off',
                    renderLineHighlight: 'all',
                });
                registerContextActions(editorFull);
            } else {
                monaco.editor.setTheme(_isDark ? 'vs-dark' : 'vs');
                editorFull.updateOptions({ fontSize: _outputFontSize });
                if (editorOutput && editorFull.getModel() !== editorOutput.getModel())
                    editorFull.setModel(editorOutput.getModel());
                editorFull.layout();
            }
            setTimeout(() => editorFull && editorFull.focus(), 50);
        }
        function closeFullscreen() {
            document.getElementById('fullscreenOverlay').classList.remove('active');
            if (editorOutput) editorOutput.focus();
        }
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && document.getElementById('fullscreenOverlay').classList.contains('active'))
                closeFullscreen();
        });

// ===== THEME =====
        function toggleTheme() {
            _isDark = !_isDark;
            document.body.classList.toggle('light', !_isDark);
            const btn = document.getElementById('themeToggle');
            const theme = _isDark ? 'vs-dark' : 'vs';
            btn.innerHTML = _isDark ? '<span class="icon">🌙</span><span class="label">暗色</span>' : '<span class="icon">☀️</span><span class="label">亮色</span>';
            monaco.editor.setTheme(theme);
        }

// ===== TOGGLES =====
        function toggleWrap() {
            _wrapEnabled = !_wrapEnabled;
            [editorOutput, editorFull].forEach(ed => ed && ed.updateOptions({ wordWrap: _wrapEnabled ? 'on' : 'off' }));
            const btn = document.getElementById('wrapToggle');
            btn.classList.toggle('active', _wrapEnabled);
            btn.textContent = _wrapEnabled ? '⇌ 换行 ✓' : '⇌ 换行';
        }
        function toggleDeepParse() {
            _deepParseEnabled = !_deepParseEnabled;
            const btn = document.getElementById('deepParseToggle');
            btn.classList.toggle('active', _deepParseEnabled);
            btn.textContent = _deepParseEnabled ? '🔍 嵌套解析 ✓' : '🔍 嵌套解析';
            const raw = document.getElementById('monacoInput').value.trim();
            if (raw) convertNow();
            showStatus(_deepParseEnabled ? '✅ 嵌套 JSON 解析已开启' : '⚠️ 嵌套 JSON 解析已关闭', _deepParseEnabled ? 'success' : 'warning');
        }

        function toggleOutputEditable() {
            _outputReadOnly = !_outputReadOnly;
            if (editorOutput) editorOutput.updateOptions({ readOnly: _outputReadOnly });
            if (editorFull) editorFull.updateOptions({ readOnly: _outputReadOnly });
            localStorage.setItem(READ_ONLY_KEY, _outputReadOnly);
            const btn = document.getElementById('editToggle');
            btn.classList.toggle('active', !_outputReadOnly);
            btn.textContent = _outputReadOnly ? '✏️ 编辑' : '✏️ 编辑 ✓';
            showStatus(_outputReadOnly ? '⚠️ 输出区已设为只读' : '✅ 输出区已设为可编辑', _outputReadOnly ? 'warning' : 'success');
        }

// ===== TIMESTAMP BAR =====
        let _tsBarOpen = false, _tsTimer = null;
        function toggleTsBar(forceOpen) {
            if (forceOpen === true && _tsBarOpen) return;
            _tsBarOpen = forceOpen === true ? true : !_tsBarOpen;
            document.getElementById('tsBarCollapsible').classList.toggle('open', _tsBarOpen);
            document.getElementById('tsBarToggle').classList.toggle('open', _tsBarOpen);
            // close codec if opening ts
            if (_tsBarOpen && _codecBarOpen) {
                _codecBarOpen = false;
                document.getElementById('codecBarCollapsible').classList.remove('open');
                document.getElementById('codecBarToggle').classList.remove('open');
            }
            if (_tsBarOpen) {
                // Wait for animation, then scroll to reveal
                setTimeout(() => {
                    document.getElementById('tsBarCollapsible').scrollIntoView({ behavior: 'smooth', block: 'center' });
                    document.getElementById('tsTimestamp').focus();
                }, 380);
            }
        }
        function tsAutoConvert(from) {
            if (_tsTimer) clearTimeout(_tsTimer);
            _tsTimer = setTimeout(() => {
                const ts = document.getElementById('tsTimestamp').value.trim();
                const dt = document.getElementById('tsDatetime').value.trim();
                if (from === 'ts' && ts) tsFromTimestamp(ts);
                else if (from === 'dt' && dt) tsFromDatetime(dt);
            }, 400);
        }
        function tsConvert() { const ts = document.getElementById('tsTimestamp').value.trim(), dt = document.getElementById('tsDatetime').value.trim(); if (ts) tsFromTimestamp(ts); else if (dt) tsFromDatetime(dt); }
        function tsFromTimestamp(val) {
            let num = Number(val); if (isNaN(num) || val === '') return;
            if (String(val).length <= 10) num = num * 1000;
            const d = new Date(num); if (isNaN(d.getTime())) return;
            const pad = n => String(n).padStart(2,'0');
            document.getElementById('tsDatetime').value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
            if (String(val).length <= 10) document.getElementById('tsTimestamp').value = num;
            highlightTsInput('tsDatetime');
        }
        function tsFromDatetime(val) {
            const n = val.replace(' ','T'); let d = new Date(n);
            if (isNaN(d.getTime())) d = new Date(n + 'T00:00:00');
            if (isNaN(d.getTime())) return;
            document.getElementById('tsTimestamp').value = d.getTime();
            highlightTsInput('tsTimestamp');
        }
        function highlightTsInput(id) {
            const el = document.getElementById(id);
            el.style.borderColor = 'var(--accent)'; el.style.boxShadow = '0 0 0 3px var(--accent-glow)';
            setTimeout(() => { el.style.borderColor = ''; el.style.boxShadow = ''; }, 1200);
        }
        function tsClear(id) { document.getElementById(id).value = ''; document.getElementById(id).focus(); }
        function tsNow() { const now = Date.now(); document.getElementById('tsTimestamp').value = now; tsFromTimestamp(String(now)); highlightTsInput('tsTimestamp'); highlightTsInput('tsDatetime'); }

// ===== CODEC BAR =====
        let _codecBarOpen = false;
        let _currentCodec = 'base64';

        function toggleCodecBar(forceOpen) {
            if (forceOpen === true && _codecBarOpen) return;
            _codecBarOpen = forceOpen === true ? true : !_codecBarOpen;
            document.getElementById('codecBarCollapsible').classList.toggle('open', _codecBarOpen);
            document.getElementById('codecBarToggle').classList.toggle('open', _codecBarOpen);
            // close ts if opening codec
            if (_codecBarOpen && _tsBarOpen) {
                _tsBarOpen = false;
                document.getElementById('tsBarCollapsible').classList.remove('open');
                document.getElementById('tsBarToggle').classList.remove('open');
            }
            if (_codecBarOpen) {
                setTimeout(() => {
                    document.getElementById('codecBarCollapsible').scrollIntoView({ behavior: 'smooth', block: 'center' });
                    document.getElementById('codecInput').focus();
                }, 420);
            }
        }

        function selectCodec(codec) {
            _currentCodec = codec;
            document.querySelectorAll('.codec-tab').forEach(t => t.classList.toggle('active', t.dataset.codec === codec));
            document.getElementById('codecInput').placeholder = _codecMeta[codec] ? _codecMeta[codec].placeholder : '输入内容...';
            document.getElementById('codecOutput').value = '';
        }

        const _codecMeta = {
            base64:  { label:'Base64\n编 / 解码',   placeholder:'输入文本，或粘贴 Base64 字符串进行解码...' },
            url:     { label:'URL\n编 / 解码',      placeholder:'输入文本，或粘贴已编码的 URL 进行解码...' },
            unicode: { label:'Unicode\n转义互换',   placeholder:'输入文本（如：你好）或转义序列（如：\\u4f60\\u597d）...' },
            html:    { label:'HTML实体\n编 / 解码', placeholder:'输入文本（如：<div>）或实体（如：&lt;div&gt;）...' },
            hex:     { label:'Hex\n编 / 解码',      placeholder:'输入文本，或粘贴十六进制字节串（如：48656c6c6f）...' },
            jwt:     { label:'JWT\n仅支持解码',     placeholder:'粘贴 JWT Token（格式：header.payload.signature）...' },
        };

        function codecEncode() {
            const val = document.getElementById('codecInput').value;
            if (!val.trim()) { showStatus('⚠️ 请输入内容', 'warning'); return; }
            let result = '';
            try {
                switch (_currentCodec) {
                    case 'base64':
                        result = btoa(unescape(encodeURIComponent(val)));
                        break;
                    case 'url':
                        result = encodeURIComponent(val);
                        break;
                    case 'unicode':
                        result = [...val].map(c => {
                            const code = c.codePointAt(0);
                            return code > 127 ? `\\u${code.toString(16).padStart(4,'0')}` : c;
                        }).join('');
                        break;
                    case 'html':
                        result = val.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                            .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
                        break;
                    case 'hex':
                        result = [...new TextEncoder().encode(val)].map(b => b.toString(16).padStart(2,'0')).join('');
                        break;
                    case 'jwt':
                        showStatus('⚠️ JWT 为只读解码，不支持编码', 'warning'); return;
                }
                highlightCodecOutput(result);
            } catch(e) {
                showStatus('❌ 编码失败：' + e.message, 'error');
            }
        }

        function codecDecode() {
            const val = document.getElementById('codecInput').value;
            if (!val.trim()) { showStatus('⚠️ 请输入内容', 'warning'); return; }
            let result = '';
            try {
                switch (_currentCodec) {
                    case 'base64':
                        result = decodeURIComponent(escape(atob(val.trim())));
                        break;
                    case 'url':
                        result = decodeURIComponent(val);
                        break;
                    case 'unicode':
                        result = val.replace(/\\u([0-9a-fA-F]{4})/g, (_, h) => String.fromCharCode(parseInt(h, 16)));
                        break;
                    case 'html':
                        const d = document.createElement('textarea');
                        d.innerHTML = val; result = d.value;
                        break;
                    case 'hex': {
                        const clean = val.replace(/\s/g,'');
                        const bytes = new Uint8Array(clean.match(/.{1,2}/g).map(b => parseInt(b,16)));
                        result = new TextDecoder().decode(bytes);
                        break;
                    }
                    case 'jwt': {
                        const parts = val.trim().split('.');
                        if (parts.length < 2) { showStatus('⚠️ 无效的 JWT 格式', 'warning'); return; }
                        const pad = s => s + '='.repeat((4 - s.length % 4) % 4);
                        const header = JSON.parse(decodeURIComponent(escape(atob(pad(parts[0])))));
                        const payload = JSON.parse(decodeURIComponent(escape(atob(pad(parts[1])))));
                        result = JSON.stringify({ header, payload }, null, 2);
                        break;
                    }
                }
                highlightCodecOutput(result);
            } catch(e) {
                showStatus('❌ 解码失败：' + e.message, 'error');
            }
        }

        function highlightCodecOutput(val) {
            const el = document.getElementById('codecOutput');
            el.value = val;
            el.style.borderColor = 'var(--accent)'; el.style.boxShadow = '0 0 0 3px var(--accent-glow)';
            setTimeout(() => { el.style.borderColor = ''; el.style.boxShadow = ''; }, 1200);
        }

        function codecSwap() {
            const inp = document.getElementById('codecInput');
            const out = document.getElementById('codecOutput');
            const tmp = inp.value;
            inp.value = out.value;
            out.value = tmp;
        }

        function codecClear(id) {
            document.getElementById(id).value = '';
            document.getElementById(id).focus();
        }

        function codecClearInput() {
            document.getElementById('codecInput').value = '';
            document.getElementById('codecOutput').value = '';
            document.getElementById('codecInput').focus();
        }

        function codecCopy() {
            const val = document.getElementById('codecOutput').value;
            if (!val) { showStatus('⚠️ 没有可复制的内容', 'warning'); return; }
            navigator.clipboard.writeText(val)
                .then(() => showStatus('✅ 已复制：' + val.slice(0,40), 'success'))
                .catch(() => { showStatus('❌ 复制失败', 'error'); });
        }

// ===== OUTPUT FONT SIZE & READ ONLY =====
        const FONT_SIZE_KEY = 'mongo_converter_font_size';
        const READ_ONLY_KEY = 'mongo_converter_output_readonly';
        let _outputFontSize = parseInt(localStorage.getItem(FONT_SIZE_KEY) || '13', 10);
        let _outputReadOnly = localStorage.getItem(READ_ONLY_KEY) === 'true';
        function changeOutputFontSize(delta) {
            _outputFontSize = Math.min(24, Math.max(9, _outputFontSize + delta));
            if (editorOutput) editorOutput.updateOptions({ fontSize: _outputFontSize });
            if (editorFull) editorFull.updateOptions({ fontSize: _outputFontSize });
            document.getElementById('outputFontSizeLabel').textContent = _outputFontSize + 'px';
            localStorage.setItem(FONT_SIZE_KEY, _outputFontSize);
        }
// Apply saved font size label on load
        document.getElementById('outputFontSizeLabel').textContent = _outputFontSize + 'px';

// ===== DIVIDER DRAG =====
        const dividerEl = document.getElementById('divider');
        const contentEl = document.getElementById('mainArea');
        let _isResizing = false;
        dividerEl.addEventListener('mousedown', () => { _isResizing = true; dividerEl.classList.add('dragging'); document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none'; });
        document.addEventListener('mousemove', e => {
            if (!_isResizing) return;
            const r = contentEl.getBoundingClientRect(), l = e.clientX - r.left, ri = r.width - l - 6;
            if (l < 200 || ri < 200) return;
            document.getElementById('leftSection').style.flex = `0 0 ${l}px`;
            document.getElementById('rightSection').style.flex = `0 0 ${ri}px`;
        });
        document.addEventListener('mouseup', () => { if (_isResizing) { _isResizing = false; dividerEl.classList.remove('dragging'); document.body.style.cursor = 'default'; document.body.style.userSelect = 'auto'; } });

// ===== UTILS =====
        function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Expose
        window.changeOutputFontSize = changeOutputFontSize;
        window.quickPaste = quickPaste;
        window.convertNow = convertNow;
        window.copyOutput = copyOutput;
        window.downloadJSON = downloadJSON;
        window.clearAll = clearAll;
        window.toggleTheme = toggleTheme;
        window.toggleWrap = toggleWrap;
        window.toggleDeepParse = toggleDeepParse;
        window.openFullscreen = openFullscreen;
        window.closeFullscreen = closeFullscreen;
        window.toggleTsBar = toggleTsBar;
        window.tsAutoConvert = tsAutoConvert;
        window.tsConvert = tsConvert;
        window.tsClear = tsClear;
        window.tsNow = tsNow;
        window.openHistory = openHistory;
        window.closeHistory = closeHistory;
        window.restoreHistory = restoreHistory;
        window.deleteHistory = deleteHistory;
        window.clearHistory = clearHistory;
        window.toggleCodecBar = toggleCodecBar;
        window.selectCodec = selectCodec;
        window.codecEncode = codecEncode;
        window.codecDecode = codecDecode;
        window.codecSwap = codecSwap;
        window.codecClear = codecClear;
        window.codecClearInput = codecClearInput;
        window.codecCopy = codecCopy;
        window.openFilterPanel = openFilterPanel;
        window.closeFilterPanel = closeFilterPanel;
        window.toggleField = toggleField;
        window.selectAllFields = selectAllFields;
        window.deselectAllFields = deselectAllFields;
        window.invertSelection = invertSelection;
        window.applyFieldFilter = applyFieldFilter;
        window.resetFilter = resetFilter;
        window.filterSearchFields = filterSearchFields;
        window.toggleOutputEditable = toggleOutputEditable;

        // Init edit toggle state
        if (!_outputReadOnly) {
            const btn = document.getElementById('editToggle');
            if (btn) {
                btn.classList.add('active');
                btn.textContent = '✏️ 编辑 ✓';
            }
        }
    })();
</script>
